name: Scrape Pricing

on:
  schedule:
    - cron: '15 7 * * 1'   # Monday 07:15 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python scraper.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/pricing.csv
          git diff --staged --quiet || git commit -m "chore: update pricing data $(date -u +%Y-%m-%d)"
          git push
